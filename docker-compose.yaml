services:
  api:
    build:
      context: .
      dockerfile: DockerFile
    container_name: auxiliomecanico-api
    env_file:
      - .env
    environment:
      MEDIA_ROOT: /app/app/media
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-service-account.json
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "${API_PORT:-8001}:8001"
    volumes:
      - .:/app
      - app_media:/app/app/media
      - ./firebase-service-account.json:/run/secrets/firebase-service-account.json:ro
    depends_on:
      ollama:
        condition: service_started
    command: >
      sh -c "python -m alembic upgrade head &&
             uvicorn app.main:app --reload --host 0.0.0.0 --port 8001"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: auxiliomecanico-ollama
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    ports:
      - "11434:11434"
    command: ["exec /bin/sh /entrypoint.sh"]
    restart: unless-stopped

volumes:
  app_media:
  ollama_data:
